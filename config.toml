baseURL = "https://superxddd.github.io/"
languageCode = "zh-cn"
title = "许达的技术博客"
theme = "stack"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true

[pagination]
pagerSize = 10

[params]
mainSections = ["posts"]
rssFullContent = true
description = "专注数据库内核、系统软件与后端基础设施"

# 自定义样式
[params.customCSS]
enabled = true

[params.footer]
since = 2026

[params.sidebar]
emoji = "💻"
subtitle = "专注数据库内核、系统软件与后端基础设施的学习与实践"
# 不设置 avatar，避免空白区域

[params.article]
[params.article.license]
enabled = false

[params.widgets]
homepage = [
    { type = "search" },
    { type = "categories", params = { limit = 10 } },
    { type = "tag-cloud", params = { limit = 15 } },
]
page = [{ type = "toc" }]

[params.comments]
enabled = false

[[params.socialIcons]]
identifier = "github"
name = "GitHub"
url = "https://github.com/superxddd"

[[params.socialIcons]]
identifier = "rss"
name = "RSS"
url = "/index.xml"

