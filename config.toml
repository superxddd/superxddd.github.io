baseURL = "https://superxddd.github.io/"
languageCode = "zh-cn"
title = "许达的技术博客"
theme = "PaperMod"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true

[pagination]
pagerSize = 10

[params]
mainSections = ["posts"]
rssFullContent = true
description = "专注数据库内核、系统软件与后端基础设施"
author = "许达"
env = "production"
defaultTheme = "auto"
ShowReadingTime = true
ShowWordCount = true
ShowCodeCopyButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowToc = true
TocOpen = true
comments = false

# 自定义样式
[params.customCSS]
enabled = true

[params.footer]
since = 2026

[params.sidebar]
emoji = "💻"
subtitle = "专注数据库内核、系统软件与后端基础设施的学习与实践"
# 不设置 avatar，避免空白区域

[params.article]
[params.article.license]
enabled = false

[params.widgets]
homepage = [
    { type = "search" },
    { type = "categories", params = { limit = 10 } },
    { type = "tag-cloud", params = { limit = 15 } },
]
page = [{ type = "toc" }]

[[params.socialIcons]]
name = "GitHub"
url = "https://github.com/superxddd"

[[params.socialIcons]]
name = "RSS"
url = "/index.xml"

[menu]
[[menu.main]]
identifier = "home"
name = "首页"
url = "/"
weight = 1

[[menu.main]]
identifier = "posts"
name = "文章"
url = "/posts/"
weight = 2

[[menu.main]]
identifier = "archives"
name = "归档"
url = "/archives/"
weight = 3

[[menu.main]]
identifier = "tags"
name = "标签"
url = "/tags/"
weight = 4

[[menu.main]]
identifier = "search"
name = "搜索"
url = "/search/"
weight = 5

[[menu.main]]
identifier = "about"
name = "关于"
url = "/about/"
weight = 6

[outputs]
home = ["HTML", "RSS", "JSON"]
